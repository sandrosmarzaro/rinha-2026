target-version = "py314"
line-length = 100
extend-exclude = [
    "Dockerfile",
    ".coveragerc",
]

[format]
quote-style = "single"

[lint]
select = ["ALL"]
ignore = [
    "D",      # pydocstyle — no docstring enforcement
    "ANN",    # flake8-annotations — zuban handles type checking
    "Q",      # flake8-quotes (handled by formatter)
    "S101",   # assert usage (needed in tests)
    "COM812", # trailing comma (conflicts with formatter)
    "ISC001", # single-line-implicit-string-concatenation (conflicts with formatter)
    "SLF001", # private member access (needed in cross-object access)
    "ARG002", # unused method argument (common in abstract methods and fixtures)
    "PT003",  # pytest fixture scope (style preference)
    "INP001", # implicit namespace packages — Python 3.3+ namespace packages
    "TC001",  # type-checking imports (application) — irrelevant in py3.14 + PEP 649
    "TC002",  # type-checking imports (third-party)
    "TC003",  # type-checking imports (stdlib)
]

[lint.mccabe]
max-complexity = 10

[lint.isort]
known-first-party = ["fraud_api"]

[lint.per-file-ignores]
"tests/**" = [
    "ANN",     # no annotation enforcement in tests
    "ARG",     # unused arguments in test fixtures/params
    "PLC0415", # local imports in test helpers
    "PLR2004", # magic values are fine in tests
    "PLR6301", # methods don't need to be static in test classes
]
"scripts/**" = [
    "T201",    # print() is fine in build scripts
    "PLR2004", # magic values are fine in pre-processing scripts
]
