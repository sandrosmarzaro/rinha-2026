x-api: &api
  image: sandrosmarzaro/rinha-2026:c4d12ec
  networks: [rinha-net]
  volumes:
    - sockets:/tmp/sockets
  healthcheck:
    test: ['CMD-SHELL', 'test -S "$$RINHA_SOCKET"']
    interval: 1s
    timeout: 1s
    retries: 30
  deploy:
    resources:
      limits:
        cpus: '0.45'
        memory: 165M

services:
  api1:
    <<: *api
    container_name: api-1
    environment:
      RINHA_SOCKET: /tmp/sockets/api1.sock

  api2:
    <<: *api
    container_name: api-2
    environment:
      RINHA_SOCKET: /tmp/sockets/api2.sock

  haproxy:
    image: haproxy:3.0-alpine
    container_name: load-balancer
    networks: [rinha-net]
    ports:
      - '9999:9999'
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
      - sockets:/tmp/sockets
    depends_on:
      api1:
        condition: service_healthy
      api2:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.10'
          memory: 20M

networks:
  rinha-net:
    driver: bridge

volumes:
  sockets:
    driver: local
    driver_opts:
      type: tmpfs
      device: tmpfs
